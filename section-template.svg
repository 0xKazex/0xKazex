<svg width="600" height="60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgX" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <filter id="glowX">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="600" height="60" fill="url(#bgX)"/>
  
  <path d="M 5 5 L 25 5 M 5 5 L 5 25" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 5 55 L 25 55 M 5 55 L 5 35" stroke="#B30000" stroke-width="2" fill="none"/>
  
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#B30000" font-weight="bold">❯</text>
  <text x="65" y="38" font-family="monospace" font-size="20" fill="#ffffff" font-weight="bold" filter="url(#glowX)">
    ./TON_TITRE.sh
  </text>
  
  <text x="590" y="38" text-anchor="end" font-family="monospace" font-size="11" fill="#B30000" letter-spacing="2">
    [ TON_STATUS ]
  </text>
  
  <rect x="POSITION" y="22" width="10" height="20" fill="#B30000">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>

./TON_TITRE.sh → ton nom de section
[ TON_STATUS ] → ton status ([ EXEC ], [ LOADED ], [ ACTIVE ], etc.)
POSITION du curseur clignotant → calcule selon la longueur du titre :
Court (ex: ./id.sh) → x="140"
Moyen (ex: ./skills.sh) → x="200"
Long (ex: ./repositories.sh) → x="265"
