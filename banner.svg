<svg width="1200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B30000" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect width="1200" height="200" fill="url(#grid)"/>
  
  <!-- Scan line animée -->
  <rect x="0" y="0" width="1200" height="2" fill="#B30000" opacity="0.6">
    <animate attributeName="y" from="0" to="200" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Code matrix style en arrière-plan -->
  <text x="20" y="30" font-family="monospace" font-size="11" fill="#B30000" opacity="0.3">
    0x7FFE_FFAB  push rbp
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="180" font-family="monospace" font-size="11" fill="#B30000" opacity="0.3">
    0x7FFE_FFB0  mov rbp, rsp
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="900" y="30" font-family="monospace" font-size="11" fill="#B30000" opacity="0.3">
    [+] kernel exploit
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="900" y="180" font-family="monospace" font-size="11" fill="#B30000" opacity="0.3">
    [✓] shell spawned
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/>
  </text>
  
  <!-- Titre principal -->
  <text x="600" y="95" text-anchor="middle" font-family="monospace" font-size="56" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    0xKazex
  </text>
  
  <!-- Curseur clignotant -->
  <rect x="822" y="58" width="14" height="50" fill="#B30000">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Sous-titre -->
  <text x="600" y="130" text-anchor="middle" font-family="monospace" font-size="16" fill="#B30000" letter-spacing="4">
    // SECURITY RESEARCH ENGINEER // APPRENTICE //
  </text>
  
  <!-- Ligne de status en bas -->
  <text x="600" y="165" text-anchor="middle" font-family="monospace" font-size="12" fill="#888888" letter-spacing="2">
    [ STATUS: BOOTING ] [ PHASE: 0 ] [ TARGET: SECURITY RESEARCH ]
  </text>
  
  <!-- Bordures rouges en coin (effet HUD) -->
  <path d="M 10 10 L 50 10 M 10 10 L 10 50" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 1190 10 L 1150 10 M 1190 10 L 1190 50" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 10 190 L 50 190 M 10 190 L 10 150" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 1190 190 L 1150 190 M 1190 190 L 1190 150" stroke="#B30000" stroke-width="2" fill="none"/>
</svg>
