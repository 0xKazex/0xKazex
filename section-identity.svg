<svg width="900" height="60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="hdrBg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B30000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#660000;stop-opacity:1"/>
    </linearGradient>
    <filter id="hdrGlow1">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="60" fill="url(#hdrBg1)" rx="2"/>
  
  <!-- Coins HUD blancs -->
  <path d="M 8 8 L 25 8 M 8 8 L 8 25" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 892 8 L 875 8 M 892 8 L 892 25" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 8 52 L 25 52 M 8 52 L 8 35" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M 892 52 L 875 52 M 892 52 L 892 35" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Prompt + titre -->
  <text x="40" y="38" font-family="monospace" font-size="20" fill="#ffffff" font-weight="bold" filter="url(#hdrGlow1)">
    ❯ ./identity.sh
  </text>
  
  <!-- Curseur clignotant -->
  <rect x="240" y="22" width="10" height="20" fill="#ffffff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Status à droite -->
  <text x="870" y="38" text-anchor="end" font-family="monospace" font-size="11" fill="#ffffff" letter-spacing="2" opacity="0.9">
    [ EXEC ]
  </text>
</svg>
