<svg width="1200" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFooter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="gridFooter" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B30000" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="120" fill="url(#bgFooter)"/>
  <rect width="1200" height="120" fill="url(#gridFooter)"/>
  
  <!-- Scan line -->
  <rect x="0" y="0" width="1200" height="2" fill="#B30000" opacity="0.6">
    <animate attributeName="y" from="0" to="120" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Texte centré -->
  <text x="600" y="55" text-anchor="middle" font-family="monospace" font-size="14" fill="#B30000" letter-spacing="3">
    [ CONNECTION TERMINATED ]
  </text>
  
  <text x="600" y="85" text-anchor="middle" font-family="monospace" font-size="11" fill="#888888" letter-spacing="2">
    root@kazex:~# exit 0
  </text>
  
  <!-- Bordures -->
  <path d="M 10 10 L 50 10 M 10 10 L 10 50" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 1190 10 L 1150 10 M 1190 10 L 1190 50" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 10 110 L 50 110 M 10 110 L 10 70" stroke="#B30000" stroke-width="2" fill="none"/>
  <path d="M 1190 110 L 1150 110 M 1190 110 L 1190 70" stroke="#B30000" stroke-width="2" fill="none"/>
</svg>
