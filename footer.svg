<svg width="1200" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFooter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a0000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </linearGradient>
    <pattern id="gridFooter" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#B30000" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <filter id="footerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="180" fill="url(#bgFooter)"/>
  <rect width="1200" height="180" fill="url(#gridFooter)"/>
  
  <!-- Scan line -->
  <rect x="0" y="0" width="1200" height="2" fill="#B30000" opacity="0.6">
    <animate attributeName="y" from="0" to="180" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Bordures HUD -->
  <path d="M 15 15 L 60 15 M 15 15 L 15 60" stroke="#B30000" stroke-width="2.5" fill="none" filter="url(#footerGlow)"/>
  <path d="M 1185 15 L 1140 15 M 1185 15 L 1185 60" stroke="#B30000" stroke-width="2.5" fill="none" filter="url(#footerGlow)"/>
  <path d="M 15 165 L 60 165 M 15 165 L 15 120" stroke="#B30000" stroke-width="2.5" fill="none" filter="url(#footerGlow)"/>
  <path d="M 1185 165 L 1140 165 M 1185 165 L 1185 120" stroke="#B30000" stroke-width="2.5" fill="none" filter="url(#footerGlow)"/>
  
  <!-- Status lines -->
  <text x="600" y="50" text-anchor="middle" font-family="monospace" font-size="18" fill="#B30000" letter-spacing="6" font-weight="bold" filter="url(#footerGlow)">
    [ END OF TRANSMISSION ]
  </text>
  
  <line x1="400" y1="65" x2="800" y2="65" stroke="#B30000" stroke-width="0.5" opacity="0.5"/>
  
  <text x="600" y="95" text-anchor="middle" font-family="monospace" font-size="13" fill="#888888" letter-spacing="3">
    root@kazex:~# logout
  </text>
  
  <text x="600" y="120" text-anchor="middle" font-family="monospace" font-size="11" fill="#555555" letter-spacing="2">
    Connection to 0xkazex closed.
  </text>
  
  <text x="600" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#444444" letter-spacing="4">
    © 0xKazex · 2026 · BUILT WITH PATIENCE
  </text>
  
  <!-- Triangles décoratifs -->
  <polygon points="100,15 110,5 120,15" fill="#B30000" opacity="0.6"/>
  <polygon points="1080,165 1090,175 1100,165" fill="#B30000" opacity="0.6"/>
</svg>
